<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>CMS3‑FAST: VR Example</title>
  <meta name="description" content="Large DDD model" />
  <!--
    Galaxy S22 Ultra target: 3088 x 1440 px in landscape (6.8 in / 19.3:9).
    Keeping the viewport at device width prevents the browser from scaling the
    two-eye render before it reaches a Cardboard-style viewer.
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="mobile-web-app-capable" content="yes" />

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.5.0/dist/aframe-extras.controls.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-randomizer-components@3.0.2/dist/aframe-randomizer-components.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-environment-component@1.3.7/dist/aframe-environment-component.min.js"></script>

  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000;
    }

    /* Shown before the phone is placed in the viewer; never rendered in VR. */
    #rotate-phone {
      position: fixed;
      z-index: 10;
      inset: 0;
      display: none;
      place-items: center;
      padding: 2rem;
      box-sizing: border-box;
      color: #fff;
      background: rgba(0, 0, 0, 0.86);
      font: 600 1rem/1.45 system-ui, sans-serif;
      text-align: center;
      pointer-events: none;
    }

    #rotate-phone span {
      max-width: 24rem;
    }

    @media (orientation: portrait) {
      #rotate-phone.is-phone { display: grid; }
    }

    /* A physical separation between the two full-height Cardboard viewports. */
    #eye-divider {
      position: fixed;
      z-index: 9;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 6px;
      margin-left: -3px;
      background: #000;
      pointer-events: none;
    }

    #enter-cardboard {
      position: fixed;
      z-index: 11;
      right: max(1rem, env(safe-area-inset-right));
      bottom: max(1rem, env(safe-area-inset-bottom));
      border: 0;
      border-radius: 999px;
      padding: 0.85rem 1.15rem;
      color: #111;
      background: #fff;
      box-shadow: 0 0.25rem 1rem rgba(0, 0, 0, 0.45);
      font: 700 0.95rem/1 system-ui, sans-serif;
    }

    body.cardboard-mode #enter-cardboard {
      display: none;
    }

  </style>

  <script>
    /*
      TopMaxions is a Google-Cardboard-style viewer, so use the published
      Cardboard optical baseline (80 degree FOV, ~64 mm lens spacing). The
      component renders separate left/right camera views through WebGL without
      requiring a WebXR headset. This is necessary for a passive phone viewer
      such as Cardboard, which does not advertise itself to the browser as a
      headset.
    */
    AFRAME.registerComponent('cardboard-stereo', {
      schema: {
        eyeSeparation: {default: 0.064}
      },

      init: function () {
        const scene = this.el;
        const rotateNotice = document.getElementById('rotate-phone');
        const enterButton = document.getElementById('enter-cardboard');
        const isPhone = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        const viewportSize = new THREE.Vector2();

        if (isPhone) rotateNotice.classList.add('is-phone');

        /*
          StereoCamera owns two real perspective cameras. `aspect = 0.5` is
          Three.js's supported way to derive an eye projection from A-Frame's
          full-canvas camera. Each eye is also translated by half the IPD.
        */
        this.stereoCamera = new THREE.StereoCamera();
        this.stereoCamera.aspect = 0.5;
        this.stereoCamera.eyeSep = this.data.eyeSeparation;

        const renderStereo = (object, camera) => {
          const renderer = this.renderer;
          if (renderer.xr.isPresenting || !camera.isPerspectiveCamera) {
            this.renderNormally(object, camera);
            return;
          }

          /*
            Three.js viewport coordinates are logical pixels. Using drawing-
            buffer pixels here would apply devicePixelRatio twice on phones.
          */
          renderer.getSize(viewportSize);
          const width = viewportSize.x;
          const height = viewportSize.y;
          const eyeWidth = width / 2;

          if (!width || !height || !eyeWidth) {
            this.renderNormally(object, camera);
            return;
          }

          const priorAutoClear = renderer.autoClear;
          const priorFocus = camera.focus;

          try {
            object.updateMatrixWorld();
            if (camera.parent === null) camera.updateMatrixWorld();

            // Parallel optical axes avoid an arbitrary fixed convergence plane.
            camera.focus = Number.POSITIVE_INFINITY;
            this.stereoCamera.update(camera);

            renderer.autoClear = false;
            renderer.setScissorTest(false);
            renderer.clear(true, true, true);
            renderer.setScissorTest(true);

            renderer.setViewport(0, 0, eyeWidth, height);
            renderer.setScissor(0, 0, eyeWidth, height);
            this.renderNormally(object, this.stereoCamera.cameraL);

            renderer.setViewport(eyeWidth, 0, width - eyeWidth, height);
            renderer.setScissor(eyeWidth, 0, width - eyeWidth, height);
            this.renderNormally(object, this.stereoCamera.cameraR);
          } finally {
            camera.focus = priorFocus;
            renderer.setScissorTest(false);
            renderer.setViewport(0, 0, width, height);
            renderer.setScissor(0, 0, width, height);
            renderer.autoClear = priorAutoClear;
          }
        };

        const installStereoRenderer = () => {
          if (this.renderer || !scene.renderer) return;
          this.renderer = scene.renderer;
          this.renderNormally = this.renderer.render.bind(this.renderer);
          this.renderer.render = renderStereo;
        };

        const enterCardboard = () => {
          document.body.classList.add('cardboard-mode');

          const fullscreen = document.documentElement.requestFullscreen ||
            document.documentElement.webkitRequestFullscreen;
          if (fullscreen) {
            Promise.resolve(fullscreen.call(document.documentElement, {navigationUI: 'hide'}))
              .then(() => screen.orientation?.lock?.('landscape'))
              .catch(() => {
                // Stereo still works when a browser does not grant fullscreen.
              });
          }
        };

        scene.addEventListener('render-target-loaded', installStereoRenderer);
        enterButton.addEventListener('click', enterCardboard);
        installStereoRenderer();

        this.removeListeners = () => {
          enterButton.removeEventListener('click', enterCardboard);
          scene.removeEventListener('render-target-loaded', installStereoRenderer);
          if (this.renderer && this.renderNormally) this.renderer.render = this.renderNormally;
        };
      },

      remove: function () {
        this.removeListeners();
      }
    });
  </script>
</head>
<body>
  <div id="rotate-phone" aria-live="polite">
    <span>Rotate your Galaxy S22 Ultra to landscape, then enter Cardboard before placing it in the TopMaxions viewer.</span>
  </div>
  <div id="eye-divider" aria-hidden="true"></div>
  <button id="enter-cardboard" type="button">Enter Cardboard</button>

  <a-scene
    cardboard-stereo
    renderer="antialias: false; colorManagement: true; physicallyCorrectLights: true; maxCanvasWidth: 3088; maxCanvasHeight: 1440;"
    xr-mode-ui="enabled: false"
  >
    <a-assets>
      <template id="avatar-template">
        <a-entity class="avatar">
          <a-sphere class="head" scale="0.45 0.5 0.4"></a-sphere>
          <a-entity class="face" position="0 0.05 0">
            <a-sphere class="eye" color="#efefef" position="0.16 0.1 -0.35" scale="0.12"></a-sphere>
            <a-sphere class="pupil" color="#000" position="0 0 -1" scale="0.2"></a-sphere>
            <a-sphere class="eye" color="#efefef" position="-0.16 0.1 -0.35" scale="0.12"></a-sphere>
            <a-sphere class="pupil" color="#000" position="0 0 -1" scale="0.2"></a-sphere>
          </a-entity>
        </a-entity>
      </template>
    </a-assets>

    <!-- Keep the subject about 5 m away so a physical 64 mm IPD creates
         useful binocular disparity without exaggerating the eye spacing. -->
    <a-entity id="cameraRig" position="10 1.6 15" movement-controls="fly:true; speed:0.1;">
      <a-entity
        camera
        position="0 0 0"
        camera="fov: 80; near: 0.05; far: 50"
        wasd-controls="acceleration:25;fly:true;"
        look-controls="magicWindowTrackingEnabled: true; touchEnabled: true"
      >
        <a-sphere class="head" visible="false" random-color></a-sphere>
      </a-entity>
    </a-entity>

    <a-entity
      gltf-model="exported_model.glb"
      position="10 1.44 10"
      rotation="90 0 0"
      scale="1.2 1.2 1.2"
    ></a-entity>

    <a-entity environment="preset: default"></a-entity>
    <a-entity light="type:ambient; intensity:2.0"></a-entity>

  </a-scene>

</body>
</html>
